<!doctype html>
<html>
    <head>
        <title>Hangman</title>
        <meta charset="UTF-8" />
        <link href="hangman.css" rel="stylesheet" type="text/css" />
        <script src="lib/GameController.js" type="text/javascript"></script>
        <!-- Put your JavaScript code in 'hangman.js' and use GameController.x methods -->
        <script src="hangman.js" type="text/javascript"></script>
    </head>

    <body>
        <header>
            <h1 id="title">Hangman!</h1>
            <button id="new-game-btn">NEW GAME</button>
            <div id="category"><p>Category: <span id="current-category-display">-</span></p></div>
        </header>


        <section id="game-status">
                <p>Guesses Remaining: <span id="guesses-display">6</span></p>
        </section>

        <div id="message-display"></div>

    <main>
        
        
        
        <div id="category-panel" style="display: none;">
            <h2>Select a Category</h2>
            <select id="category-select">
                </select>
            <button id="start-btn">OK</button>
        </div>

        <section id="visuals-area">
            <img id="hangman-img" src="images/0.png" alt="Hangman state 0">
        </section>

        

        <div id="game-info-column">
            <div id="word-display"></div>
            <div id="letters-container"></div>
        </div>

        
    </main>

    </body>
</html>
